steps:
  # 0. Lint & test (fail early)
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm ci && npm run lint || true'   # replace || true with actual failure when you have lint script

  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/trustlens-backend-493416/frontend-repo/frontend-image:$SHORT_SHA'
      - '--build-arg'
      - 'VITE_API_BASE_URL=${_VITE_API_BASE_URL}'
      - 'trustlens-frontend/'

  # 2. Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/trustlens-backend-493416/frontend-repo/frontend-image:$SHORT_SHA'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'resume-frontend'
      - '--image=us-central1-docker.pkg.dev/trustlens-backend-493416/frontend-repo/frontend-image:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'
      - '--memory=256Mi'
      - '--cpu=1'

images:
  - 'us-central1-docker.pkg.dev/trustlens-backend-493416/frontend-repo/frontend-image:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
