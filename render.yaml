services:
  - type: web
    name: backend-api
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port 10000

  - type: web
    name: ml-service
    runtime: python
    buildCommand: cd ml && pip install -r mlrequirements.txt
    startCommand: cd ml && streamlit run ml.py --server.port 10000 --server.address 0.0.0.0

  - type: web
    name: frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
