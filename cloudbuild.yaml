
# Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'resume-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/resume-backend'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      # Reference the secret name, but keep the value in Secret Manager
      - '--set-secrets=FIREBASE_KEY=firebase-service-account:latest'
      # Keep your non-sensitive environment variables
      - '--update-env-vars=SUPABASE_URL=your-project-url,ENVIRONMENT=production'
  logging: CLOUD_LOGGING_ONLY  # Ensures logs go straight to Cloud Logging
