steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/trustlens-backend-493416/frontend-repo/frontend-image:$SHORT_SHA'
      - '-f'
      - 'Truefront/trustlens-frontend/Dockerfile'
      - 'Truefront/trustlens-frontend'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/trustlens-backend-493416/frontend-repo/frontend-image:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'resume-frontend'
      - '--image=us-central1-docker.pkg.dev/trustlens-backend-493416/frontend-repo/frontend-image:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'

images:
  - 'us-central1-docker.pkg.dev/trustlens-backend-493416/frontend-repo/frontend-image:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
