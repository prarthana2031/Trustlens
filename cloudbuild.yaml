steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/trustlens-493209/backend-repo/backend-image:$SHORT_SHA'
      - '.'

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/trustlens-493209/backend-repo/backend-image:$SHORT_SHA'

  # 3. Deploy the new image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'resume-backend'
      - '--image=us-central1-docker.pkg.dev/trustlens-493209/backend-repo/backend-image:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'

# Store the image in Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/trustlens-493209/backend-repo/backend-image:$SHORT_SHA'
